<svg width="720" height="240" viewBox="0 0 720 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MysticCommerce Crown Monogram logo concept</title>
  <desc id="desc">A luxury gold MC monogram with a subtle ecommerce bag handle and premium MysticCommerce wordmark.</desc>
  <defs>
    <linearGradient id="gold" x1="64" y1="36" x2="188" y2="204" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF2B8"/>
      <stop offset="0.42" stop-color="#F5B84B"/>
      <stop offset="1" stop-color="#B97518"/>
    </linearGradient>
    <linearGradient id="ink" x1="270" y1="70" x2="665" y2="174" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#A1A1AA"/>
    </linearGradient>
    <filter id="softGlow" x="18" y="12" width="214" height="214" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.96 0 1 0 0 0.65 0 0 1 0 0.2 0 0 0 0.35 0"/>
